strategy:
  name: fx_swing_trend_reclaim_v1
  version: final_research_baseline_2H
  status: historical_research_only
  market: USDJPY
  direction_mode: short_only
  broker_target: IG
  pip_size: 0.01
  source_timezone: UTC
  production_ready: false
  live_trading_approved: false

timeframes:
  trend_timeframe: 4H
  signal_timeframe: 1H
  execution_timeframe: tick

indicators:
  ema_fast: 20
  ema_mid: 50
  ema_slow: 200
  rsi_period: 14
  atr_period: 14

entry_rules:
  trend_filter:
    enabled: true
    rule: 4H close below EMA200
  signal_filter:
    enabled: true
    rules:
      - 1H close below EMA50
      - pullback near EMA20 or EMA50 within 1.2 ATR
      - RSI14 below 50
      - RSI14 falling
      - bearish candle close
      - enter on next available tick after signal candle close
  allowed_london_sessions:
    - {name: London morning, start: "07:00", end: "11:30"}
    - {name: London New York overlap, start: "13:00", end: "16:30"}

execution:
  use_bid_ask: true
  short_entry_price: bid
  short_exit_price: ask
  long_entry_price: ask
  long_exit_price: bid
  allow_mid_for_indicators_only: true
  enter_after_signal_close: true
  max_open_positions: 1
  allow_pyramiding: false
  allow_averaging_down: false
  allow_martingale: false
  default_slippage_price_points: 0.002

stop_loss:
  method: max_of_signal_high_and_atr
  atr_multiplier: 1.2
  swing_lookback_candles: 8
  swing_buffer_atr_multiplier: 0.20

risk_management:
  risk_per_trade_percent: 0.25
  maximum_trade_duration_days: 7
  move_to_breakeven_after_r: 1.2
  partial_take_profit_r: 2.0
  partial_take_profit_percent: 50
  final_target_r: 4.0
  trailing_atr_enabled: true
  trailing_atr_multiplier: 1.5

broker_guardrails:
  broker: IG
  selected_guardrail_candidate: min_risk_3pips
  min_stop_distance_pips: 2.0
  min_take_profit_distance_pips: 2.0
  min_initial_risk_pips: 3.0
  reject_initial_risk_below_minimum: true
  validate_against_executable_entry_tick: true

spread_guardrails:
  track_entry_spread: true
  track_exit_spread: true
  track_spread_to_risk_ratio: true
  signal_spread_reject_above_pips: 2.0
  warn_spread_to_risk_ratio_above: 0.20
  reject_spread_to_risk_ratio_above: null

time_guards:
  broker_timezone: Europe/London
  block_new_entries_after: "21:30"
  overnight_funding_cutoff: "22:00"
  intraday_force_close_enabled: false
  intraday_force_close_before: "21:55"

weekend_policy:
  name: force_close_friday_20_30
  enabled: true
  force_close_friday: true
  close_time_utc: "20:30"
  block_weekend_holding: true

funding_awareness:
  enabled: true
  track_overnight_funding: true
  cutoff_time_uk: "22:00"
  apply_wednesday_triple_rollover: true
  funding_rate_source: configurable_research_assumption
  fetch_live_rates: false

validation_status:
  fx_2a_integrity: PASS
  fx_2b_weekend_policy: PASS
  fx_2c_stability: STRONG_STABILITY
  fx_2d_walk_forward: STRONG_WALK_FORWARD
  fx_2e_parameter_robustness: STRONG_ROBUSTNESS
  fx_2f_stress_testing: PASS
  fx_2g_broker_guardrails: PASS
  fx_2h_candidate_bakeoff: SELECTED_MIN_RISK_3PIPS

candidate_decision:
  selected: min_risk_3pips
  backup: ig_min_stop_only
  not_selected: recommended_research_guardrail
  human_confirmation_recorded: true
  rationale: Best balance of execution protection, retained return, profit factor, and stress resilience.

integration:
  executable_runtime_config: config/strategy.usdjpy.fx_swing_trend_reclaim.yaml
  weekend_variant_config: config/weekend_policy_variants.usdjpy.yaml
  broker_guardrail_variant_config: config/broker_guardrail_variants.usdjpy.yaml
  purpose: Versioned strategy information contract for FX-2I integration work.
