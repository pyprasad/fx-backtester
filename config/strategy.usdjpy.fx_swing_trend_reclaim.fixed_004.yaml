extends: strategy.usdjpy.fx_swing_trend_reclaim.yaml

strategy:
  epic: CS.D.USDJPY.TODAY.IP
  status: demo_preparation_backtest_only

data:
  normalised_tick_path: data/normalised_ticks/USDJPY_2022_2025.parquet
  candle_path: data/candles/USDJPY_2022_2025
  period_start: "2022-01-01"
  period_end: "2025-12-31"

position_sizing:
  mode: fixed_spread_bet_stake
  stake_per_pip_gbp: 0.04
  account_currency: GBP
  description: Fixed IG DEMO stake mode for comparing backtest behaviour with small-size DEMO trades.

broker_guardrails:
  broker: IG
  selected_guardrail_candidate: min_risk_3pips
  min_stop_distance_pips: 2.0
  min_take_profit_distance_pips: 2.0
  min_initial_risk_pips: 3.0
  reject_initial_risk_below_minimum: true

time_guards:
  broker_timezone: Europe/London
  block_new_entries_after: "21:30"
  overnight_funding_cutoff: "22:00"
  intraday_force_close_enabled: false

weekend_policy:
  enabled: true
  policy_name: force_close_friday_20_30
  block_new_trades_after_friday:
    enabled: true
    cutoff_utc: "17:00"
  force_close_on_friday:
    enabled: true
    close_time_utc: "20:30"
    close_reason: weekend_force_close
  block_sunday_open_entries:
    enabled: true
    minutes_after_week_open: 60

reporting:
  output_path: reports/runs_2022_2025_final_min_risk_3pips_fixed_004
  include_pips_metrics: true
  include_fixed_stake_metrics: true
  include_trade_level_pnl_gbp: true
  include_trade_level_pnl_pips: true
  include_comparison_to_risk_percent_baseline: true
  comparison_baseline_run_path: reports/broker_guardrails/20260614_121538_usdjpy_fx_swing_trend_reclaim_v1/variants/min_risk_3pips
  comparison_output_stem: reports/comparisons/usdjpy_final_baseline_vs_fixed_004
  baseline_validation_output_stem: reports/comparisons/fixed_004_baseline_validation
